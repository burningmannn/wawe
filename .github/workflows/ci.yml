name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build & Test
        run: |
          xcodebuild test \
            -project wawe.xcodeproj \
            -scheme wawe \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO
